<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Contact — Anson Yeung</title>
  <meta name="description" content="Contact Anson Yeung — composer for film and concert music." />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Serif:wght@400;600&family=Libre+Caslon+Text:wght@400;700&family=Libre+Baskerville:wght@400;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />

  <style>
    .contact-container{
      max-width:980px;
      margin:120px auto 80px;
      padding:0 20px;
      display:flex;
      flex-direction:column;
      gap:24px;
      align-items:center;
      text-align:center;
    }

    .contact-panel{
      width:100%;
      padding:46px;
      border-radius:0px;
      background:linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.05));
      border:1px solid rgba(255,255,255,0.5);
    }

    .contact-title{
      font-family:"Libre Baskerville",serif;
      font-size:28px;
      margin:0 0 12px;
      color:var(--soft);
    }

    .contact-lead{
      font-family:"IBM Plex Serif",serif;
      font-size:18px;
      color:var(--soft);
      margin:0 0 18px;
      line-height:1.6;
      max-width:72ch;
    }

    .contact-email{
      font-size:16px;
      color:var(--accent);
      text-decoration:none;
      font-weight:500;
    }

    @media (max-width:900px){
      .contact-container{margin:100px 16px 60px}
      .contact-panel{padding:28px}
      .contact-title{font-size:22px}
    }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a class="brand" href="index.html">Anson Yeung</a>
      <button class="nav-toggle" aria-controls="main-nav" aria-expanded="false" aria-label="Open menu">
        <svg width="24" height="24" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
          <path d="M3 6h18M3 12h18M3 18h18" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" fill="none"/>
        </svg>
      </button>
      <nav id="main-nav", class="top-nav">
        <a class="nav-link" href="film.html">Film Music</a>
        <a class="nav-link" href="concert.html">Concert Music</a>
        <a class="nav-link" href="contact.html">Contact</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="contact-container" aria-labelledby="contact-heading">
      <div class="contact-panel" role="region" aria-labelledby="contact-heading">
        <h1 id="contact-heading" class="contact-title">Contact</h1>
        <p class="contact-lead">
          For enquiries about commissions, performances, or scores, please contact me via email below. I respond to enquiries within 3 business days.
        </p>
        <a class="contact-email" href="mailto:youremail@example.com">ansonyeung.music@gmail.com</a>
      </div>
    </section>
  </main>

  <footer class="site-footer">
  © 2026 — <a href="mailto:ansonnyeung.music@gmail.com" style="color: var(--muted); text-decoration: none;">ansonyeung.music@gmail.com</a>
  </footer>

  <script>document.getElementById('year').textContent = new Date().getFullYear();</script>

  <script>
    (function(){
      // small, defensive script to toggle mobile nav
      const btn = document.querySelector('.nav-toggle');
      const nav = document.querySelector('.top-nav') || document.getElementById('main-nav');
      if (!btn || !nav) return;

      // toggle menu open/close
      btn.addEventListener('click', (e) => {
        const isOpen = nav.classList.toggle('show');
        btn.setAttribute('aria-expanded', String(isOpen));
        // optionally update label
        btn.setAttribute('aria-label', isOpen ? 'Close menu' : 'Open menu');
      });

      // close nav when a link inside it is clicked (mobile)
      nav.querySelectorAll('a').forEach(a => a.addEventListener('click', () => {
        nav.classList.remove('show');
        btn.setAttribute('aria-expanded','false');
        btn.setAttribute('aria-label','Open menu');
      }));

      // close nav when clicking outside (nice-to-have)
      document.addEventListener('click', (ev) => {
        if (!nav.classList.contains('show')) return;
        const isClickInside = nav.contains(ev.target) || btn.contains(ev.target);
        if (!isClickInside) {
          nav.classList.remove('show');
          btn.setAttribute('aria-expanded','false');
          btn.setAttribute('aria-label','Open menu');
        }
      });
    })();
  </script>
</body>
</html>
